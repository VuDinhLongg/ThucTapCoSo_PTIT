<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Nhân sự</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 70%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h2>Danh sách Nhân sự (HumanDB)</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Họ và Tên</th>
            <th>Ngày sinh</th>
            <th>Giới tính</th>
            <th>Vai trò</th>
        </tr>
        
        {% for row in humans %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>
                {% if row[3] == 'M' %}
                    <span class="male">Nam</span>
                {% elif row[3] == 'F' %}
                    <span class="female">Nữ</span>
                {% else %}
                    Khác
                {% endif %}
            </td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
